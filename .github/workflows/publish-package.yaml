name: Tests & Publishes to PyPI

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - master
      - dev/2.1.0
  pull_request:
    branches:
      - "*"

env:
  PROJECT_NAME: permetrics

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]  # Cài gói + các phụ thuộc dev (nếu vẫn dùng requirements.txt thì sửa dòng này)

      - name: Run tests & Lint
        run: |
          pytest --doctest-modules --junitxml=junit/pytest-results-${{ matrix.python-version }}.xml --cov=$PROJECT_NAME --cov-report=xml tests/
          flake8 tests/

      - name: Upload pytest test results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: junit/pytest-results-${{ matrix.python-version }}.xml
        if: always()

      - name: Build distribution package
        if: matrix.python-version == '3.11'
        run: |
          pip install build
          python -m build

      - name: Upload distribution artifacts
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: dist-package
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-package
          path: dist/

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
